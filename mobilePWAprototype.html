<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invoice Pro - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mac-accent: #007AFF;
        }
        body {
            font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif;
            background-color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            color: #1c1c1e;
            overflow-x: hidden;
        }
        .input-macos {
            background: #f5f5f7;
            border: 1px solid transparent;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-macos:focus {
            background: #fff;
            border-color: var(--mac-accent);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }
        input[type="time"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
        
        /* Progressive Disclosure Animations */
        .hidden-section {
            display: none;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .show-section {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        #autocompleteList {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Subtle Clear Button */
        .clear-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .has-client .clear-btn {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <main class="flex-grow p-6 max-w-md mx-auto w-full pt-10">
        <div class="space-y-8">
            
            <div class="pt-4">
                <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">New Entry</p>
            </div>

            <!-- Stage 1: Client Selection -->
            <div id="clientContainer" class="space-y-6">
                <div class="relative group">
                    <div class="relative flex items-center">
                        <input type="text" id="clientInput" placeholder="Client" autocomplete="off"
                            class="input-macos w-full rounded-2xl px-5 py-5 text-[17px] placeholder-slate-400 pr-12 font-medium">
                        
                        <!-- Clear Button -->
                        <button id="clearClient" class="clear-btn absolute right-4 p-1 rounded-full bg-slate-200 text-slate-500 hover:bg-slate-300 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <div id="autocompleteList" class="absolute left-0 right-0 mt-2 bg-white/95 border border-slate-200 rounded-2xl shadow-2xl z-50 hidden max-h-60 overflow-y-auto">
                        <!-- Items via JS -->
                    </div>
                </div>

                <!-- Stage 2: Dependent Fields -->
                <div id="dependentFields" class="hidden-section space-y-5">
                    
                    <!-- Description -->
                    <textarea id="description" rows="2" placeholder="Description"
                        class="input-macos w-full rounded-2xl px-5 py-5 text-[17px] placeholder-slate-400 resize-none font-medium"></textarea>

                    <!-- Times -->
                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative bg-slate-50 rounded-2xl px-5 py-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Start</span>
                            <input type="time" id="startTime" class="bg-transparent w-full text-[17px] font-medium outline-none">
                        </div>
                        <div class="relative bg-slate-50 rounded-2xl px-5 py-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">End</span>
                            <input type="time" id="finishTime" class="bg-transparent w-full text-[17px] font-medium outline-none">
                        </div>
                    </div>

                    <!-- Break Section -->
                    <div class="bg-slate-50 p-5 rounded-2xl flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Break</span>
                            <div class="flex items-baseline space-x-1">
                                <input type="number" id="breakMinutes" value="0" step="5" min="0"
                                    class="bg-transparent border-none p-0 w-10 text-[17px] font-bold focus:ring-0 text-slate-800">
                                <span class="text-slate-400 text-xs font-medium uppercase">min</span>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="adjustBreak(15)" class="h-10 px-4 bg-white border border-slate-200 rounded-xl text-[13px] font-bold shadow-sm active:bg-slate-100 transition-all">+15</button>
                            <button onclick="adjustBreak(30)" class="h-10 px-4 bg-white border border-slate-200 rounded-xl text-[13px] font-bold shadow-sm active:bg-slate-100 transition-all">+30</button>
                        </div>
                    </div>

                    <!-- Outlined Summary Section -->
                    <div id="summaryCard" class="p-8 border-2 border-slate-100 rounded-[2.5rem] bg-transparent">
                        <div class="flex justify-between items-baseline mb-6">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em] mb-1">Net Total</p>
                                <h2 id="displayTotal" class="text-4xl font-bold tracking-tight text-slate-900">$0.00</h2>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em] mb-1">Duration</p>
                                <p id="displayDuration" class="text-xl font-bold text-slate-700">0h 0m</p>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-center pt-5 border-t border-slate-100">
                            <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Super (12%)</span>
                            <span id="superEstimate" class="text-[15px] font-bold text-[#007AFF]">+$0.00</span>
                        </div>
                    </div>

                    <!-- Action Button -->
                    <div class="pt-2">
                        <button id="submitBtn" class="w-full bg-[#007AFF] text-white font-bold py-5 rounded-2xl shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all flex items-center justify-center">
                            <span class="text-[17px]">Save Entry</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="h-12 safe-area-inset"></div>

    <script>
        const clients = [
            { name: 'Acme Corp', rate: 120, superRate: 0.12 },
            { name: 'Global Tech', rate: 150, superRate: 0.12 },
            { name: 'Small Biz Inc', rate: 85, superRate: 0.12 },
            { name: 'Creative Studio', rate: 110, superRate: 0.12 },
            { name: 'Pied Piper', rate: 200, superRate: 0.12 }
        ];

        let selectedClient = null;

        const clientContainer = document.getElementById('clientContainer');
        const clientInput = document.getElementById('clientInput');
        const clearBtn = document.getElementById('clearClient');
        const autocompleteList = document.getElementById('autocompleteList');
        const dependentFields = document.getElementById('dependentFields');
        const startTimeInput = document.getElementById('startTime');
        const finishTimeInput = document.getElementById('finishTime');
        const breakInput = document.getElementById('breakMinutes');
        
        const displayTotal = document.getElementById('displayTotal');
        const displayDuration = document.getElementById('displayDuration');
        const superEstimate = document.getElementById('superEstimate');

        window.onload = () => {
            startTimeInput.value = "09:00";
            finishTimeInput.value = "17:00";
        };

        clientInput.addEventListener('input', (e) => {
            const val = e.target.value;
            autocompleteList.innerHTML = '';
            
            if (!val) { 
                autocompleteList.classList.add('hidden'); 
                if (!selectedClient) hideFields();
                return; 
            }

            const matches = clients.filter(c => c.name.toLowerCase().includes(val.toLowerCase()));

            if (matches.length > 0) {
                matches.forEach(match => {
                    const item = document.createElement('div');
                    item.className = 'px-5 py-4 cursor-pointer hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0';
                    item.innerHTML = `<div class="font-bold text-slate-800">${match.name}</div><div class="text-[11px] text-slate-400 font-bold uppercase tracking-tight">$${match.rate}/hr</div>`;
                    item.addEventListener('click', () => selectClient(match));
                    autocompleteList.appendChild(item);
                });
                autocompleteList.classList.remove('hidden');
            } else {
                autocompleteList.classList.add('hidden');
            }
        });

        function selectClient(client) {
            selectedClient = client;
            clientInput.value = client.name;
            clientInput.disabled = true;
            clientContainer.classList.add('has-client');
            autocompleteList.classList.add('hidden');
            showFields();
            calculateTotal();
            setTimeout(() => {
                document.getElementById('description').focus();
            }, 300);
        }

        clearBtn.addEventListener('click', () => {
            clientInput.value = '';
            clientInput.disabled = false;
            clientContainer.classList.remove('has-client');
            hideFields();
            setTimeout(() => clientInput.focus(), 50);
        });

        function showFields() {
            dependentFields.classList.add('show-section');
            dependentFields.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideFields() {
            dependentFields.classList.remove('show-section');
            selectedClient = null;
        }

        function calculateTotal() {
            const start = startTimeInput.value;
            const finish = finishTimeInput.value;
            const breakMins = parseInt(breakInput.value) || 0;

            if (!start || !finish) return;

            const [sH, sM] = start.split(':').map(Number);
            const [fH, fM] = finish.split(':').map(Number);

            let diffMins = (fH * 60 + fM) - (sH * 60 + sM);
            if (diffMins < 0) diffMins += 1440; 

            const netMins = Math.max(0, diffMins - breakMins);
            const netHours = netMins / 60;

            const hDisplay = Math.floor(netMins / 60);
            const mDisplay = netMins % 60;
            
            displayDuration.innerText = `${hDisplay}h ${mDisplay}m`;

            if (selectedClient) {
                const netVal = netHours * selectedClient.rate;
                const superVal = netVal * (selectedClient.superRate || 0.12);

                displayTotal.innerText = `$${netVal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                superEstimate.innerText = `+$${superVal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            }
        }

        window.adjustBreak = (val) => {
            breakInput.value = parseInt(breakInput.value || 0) + val;
            calculateTotal();
        };

        [startTimeInput, finishTimeInput, breakInput].forEach(el => {
            el.addEventListener('input', calculateTotal);
        });

        document.getElementById('submitBtn').addEventListener('click', () => {
            if (!selectedClient) return;
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span>Saved</span>';
            btn.classList.add('bg-green-500');
            setTimeout(() => {
                btn.innerHTML = '<span>Save Entry</span>';
                btn.classList.remove('bg-green-500');
            }, 2000);
        });
    </script>
</body>
</html>
