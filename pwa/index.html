<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invoicing</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Invoicing">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════ -->
<div id="loginScreen" class="screen active">
    <div class="w-full max-w-sm">
        <p class="text-[11px] font-semibold uppercase tracking-[0.2em] text-slate-400 mb-8">Jesse Morley Photography</p>
        <h1 class="text-3xl font-bold text-slate-900 mb-8">Sign In</h1>
        <div class="space-y-3">
            <input id="loginEmail" type="email" placeholder="Email" autocomplete="email"
                class="input-field w-full rounded-2xl px-5 py-4 text-[17px] placeholder-slate-400">
            <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password"
                class="input-field w-full rounded-2xl px-5 py-4 text-[17px] placeholder-slate-400">
        </div>
        <p id="loginError" class="text-red-500 text-sm mt-3 hidden"></p>
        <button id="loginBtn" class="btn-primary mt-6">Sign In</button>
    </div>
</div>

<!-- ═══════════════════════════════════════════════
     MAIN APP SHELL (shown after login)
═══════════════════════════════════════════════ -->
<div id="appShell" class="screen" style="min-height: 100dvh;">

    <!-- ── Log Entry Tab ── -->
    <div id="tabLog" class="flex-1 overflow-y-auto pb-36" style="padding-top: env(safe-area-inset-top)">
        <div class="max-w-md mx-auto px-5 pt-4">

            <div id="clientSection">

            <!-- Client selector -->
            <div id="clientContainer" class="relative">
                <div class="relative flex items-center">
                    <input type="text" id="clientInput" placeholder="Client" autocomplete="off"
                        class="input-field w-full rounded-2xl px-5 py-5 text-[17px] placeholder-slate-400 pr-12 font-medium">
                    <button id="clearClient" class="clear-btn absolute right-4 p-1 rounded-full bg-slate-200 text-slate-500">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="autocompleteList"></div>
            </div>

            <!-- Dependent fields (revealed after client select) -->
            <div id="entryFields" class="reveal space-y-4 mt-6">

                <!-- Date -->
                <div class="bg-white rounded-2xl px-5 py-3">
                    <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-1">Date</span>
                    <input type="date" id="entryDate" class="bg-transparent w-full text-[17px] font-medium outline-none">
                </div>

                <!-- ── DAY RATE FIELDS ── -->
                <div id="dayRateFields" class="hidden space-y-4">

                    <!-- Day type segmented -->
                    <div>
                        <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-2 px-1">Day Type</span>
                        <div class="seg-ctrl" style="grid-template-columns: 1fr 1fr;">
                            <button class="seg-btn active" data-day="full" onclick="setDayType('full')">Full Day</button>
                            <button class="seg-btn" data-day="half" onclick="setDayType('half')">Half Day</button>
                        </div>
                    </div>

                    <!-- Workflow (full day only) -->
                    <div id="workflowSection" class="reveal open space-y-4">
                        <div>
                            <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-2 px-1">Workflow</span>
                            <div class="flex gap-2" id="workflowBtns">
                                <button class="workflow-btn active" data-wf="Apparel" onclick="setWorkflow('Apparel')">Apparel</button>
                                <button class="workflow-btn" data-wf="Product" onclick="setWorkflow('Product')">Product</button>
                                <button class="workflow-btn" data-wf="Own Brand" onclick="setWorkflow('Own Brand')">Own Brand</button>
                            </div>
                        </div>

                        <!-- Own Brand: brand name -->
                        <div id="brandField" class="hidden">
                            <input type="text" id="brandInput" placeholder="Brand name"
                                class="input-field w-full rounded-2xl px-5 py-4 text-[17px] placeholder-slate-400 font-medium">
                        </div>

                        <!-- Apparel/Product: SKUs -->
                        <div id="skuField" class="hidden">
                            <div class="bg-white rounded-2xl px-5 py-3">
                                <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-1">SKUs Shot</span>
                                <input type="number" id="skuInput" placeholder="0" min="0"
                                    class="bg-transparent w-full text-[17px] font-medium outline-none">
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ── HOURLY FIELDS ── -->
                <div id="hourlyFields" class="hidden space-y-4">

                    <!-- ITS: Shoot client + Role -->
                    <div id="itsFields" class="hidden space-y-4">
                        <input type="text" id="shootClientInput" placeholder="Shoot Client"
                            class="input-field w-full rounded-2xl px-5 py-4 text-[17px] placeholder-slate-400 font-medium">
                        <div>
                            <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-2 px-1">Role</span>
                            <div class="seg-ctrl" style="grid-template-columns: 1fr 1fr;">
                                <button class="seg-btn active" data-role="Photographer" onclick="setRole('Photographer')">Photographer</button>
                                <button class="seg-btn" data-role="Operator" onclick="setRole('Operator')">Operator</button>
                            </div>
                        </div>
                    </div>

                    <!-- Generic hourly: description -->
                    <div id="hourlyDescField" class="hidden">
                        <textarea id="hourlyDesc" rows="2" placeholder="Description"
                            class="input-field w-full rounded-2xl px-5 py-4 text-[17px] placeholder-slate-400 resize-none font-medium"></textarea>
                    </div>

                    <!-- Times -->
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white rounded-2xl px-5 py-3">
                            <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-1">Start</span>
                            <input type="time" id="startTime" class="bg-transparent w-full text-[17px] font-medium outline-none relative">
                        </div>
                        <div class="bg-white rounded-2xl px-5 py-3">
                            <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-1">End</span>
                            <input type="time" id="finishTime" class="bg-transparent w-full text-[17px] font-medium outline-none relative">
                        </div>
                    </div>

                    <!-- Break -->
                    <div class="bg-white p-5 rounded-2xl flex items-center justify-between">
                        <div>
                            <span class="text-[10px] font-semibold uppercase tracking-wider text-slate-400 block mb-1">Break</span>
                            <div class="flex items-baseline gap-1">
                                <input type="number" id="breakMinutes" value="0" min="0" step="5"
                                    class="bg-transparent border-none p-0 w-12 text-[17px] font-bold focus:ring-0 text-slate-800 outline-none">
                                <span class="text-slate-400 text-xs font-bold uppercase">min</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="adjustBreak(15)" class="h-10 px-4 bg-slate-100 rounded-xl text-[13px] font-bold active:bg-slate-200 transition-all">+15</button>
                            <button onclick="adjustBreak(30)" class="h-10 px-4 bg-slate-100 rounded-xl text-[13px] font-bold active:bg-slate-200 transition-all">+30</button>
                        </div>
                    </div>
                </div>

                <!-- ── MANUAL FIELDS ── -->
                <div id="manualFields" class="hidden space-y-4">
                    <textarea id="manualDesc" rows="2" placeholder="Description"
                        class="input-field w-full rounded-2xl px-5 py-4 text-[17px] placeholder-slate-400 resize-none font-medium"></textarea>
                    <div class="bg-white rounded-2xl px-5 py-3">
                        <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-1">Amount ($)</span>
                        <input type="number" id="manualAmount" placeholder="0.00" step="0.01" min="0"
                            class="bg-transparent w-full text-[17px] font-medium outline-none">
                    </div>
                    <!-- Super toggle -->
                    <div class="bg-white rounded-2xl px-5 py-4 flex items-center justify-between">
                        <div>
                            <p class="text-[15px] font-semibold text-slate-800">Include Super (12%)</p>
                            <p id="superToggleLabel" class="text-[12px] text-slate-400 mt-0.5">Off</p>
                        </div>
                        <label class="toggle-wrap">
                            <input type="checkbox" id="superToggle">
                            <div class="toggle-track"><div class="toggle-thumb"></div></div>
                        </label>
                    </div>
                </div>

                <!-- ── SUMMARY CARD ── -->
                <div class="summary-card p-6 bg-white">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1">Total</p>
                            <h2 id="displayTotal" class="text-4xl font-bold tracking-tight text-slate-900">$0.00</h2>
                        </div>
                        <div class="text-right" id="durationBlock">
                            <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1">Duration</p>
                            <p id="displayDuration" class="text-xl font-bold text-slate-700">0h 0m</p>
                        </div>
                    </div>
                    <div class="space-y-1.5 pt-4 border-t border-slate-100">
                        <div id="baseLine" class="flex justify-between items-center">
                            <span class="text-[12px] font-semibold text-slate-400 uppercase tracking-wider">Base</span>
                            <span id="displayBase" class="text-[14px] font-bold text-slate-600">$0.00</span>
                        </div>
                        <div id="bonusLine" class="flex justify-between items-center hidden">
                            <span class="text-[12px] font-semibold text-slate-400 uppercase tracking-wider">Bonus</span>
                            <span id="displayBonus" class="text-[14px] font-bold text-[#34c759]">+$0.00</span>
                        </div>
                        <div id="superLine" class="flex justify-between items-center">
                            <span class="text-[12px] font-semibold text-slate-400 uppercase tracking-wider">Super (12%)</span>
                            <span id="displaySuper" class="text-[14px] font-bold text-[#007AFF]">+$0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Save button -->
                <div class="pt-1 pb-2">
                    <button id="saveBtn" class="btn-primary" disabled>Save Entry</button>
                </div>

            </div>

            </div><!-- /clientSection -->
        </div>
    </div>

    <!-- ── Recent Entries Tab ── -->
    <div id="tabRecent" class="flex-1 overflow-y-auto pb-36 hidden" style="padding-top: env(safe-area-inset-top)">
        <div class="max-w-md mx-auto px-5 pt-10">
            <div class="flex items-end justify-between mb-7 px-1">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Activity</h1>
                </div>
            </div>
            <div id="recentList" class="space-y-3">
                <p class="text-gray-400 text-sm py-8 text-center">Loading entries...</p>
            </div>
        </div>
    </div>

    <!-- ── Settings Tab ── -->
    <div id="tabSettings" class="flex-1 overflow-y-auto pb-36 hidden" style="padding-top: env(safe-area-inset-top)">
        <div class="max-w-md mx-auto px-5 pt-10">
            <div class="mb-7 px-1">
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Settings</h1>
            </div>
            <button id="signOutBtn" class="w-full py-4 rounded-2xl text-[15px] font-semibold text-red-500 bg-white border border-gray-100 shadow-sm active:bg-red-50 transition-colors cursor-pointer">
                Sign Out
            </button>
        </div>
    </div>

    <!-- ── Tab Bar — floating pill ── -->
    <nav id="tabBar">
        <div id="tabBar-inner">
            <!-- New Entry -->
            <button onclick="switchTab('log')" id="tabBtnLog" class="flex flex-col items-center gap-1.5 bg-transparent border-none cursor-pointer p-0">
                <svg id="tabIconLog" class="w-5 h-5 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                </svg>
            </button>
            <!-- Entries -->
            <button onclick="switchTab('recent')" id="tabBtnRecent" class="flex flex-col items-center gap-1.5 bg-transparent border-none cursor-pointer p-0">
                <svg id="tabIconRecent" class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </button>
            <!-- Invoices -->
            <button class="flex flex-col items-center gap-1.5 bg-transparent border-none cursor-pointer p-0" disabled>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </button>
            <!-- Settings -->
            <button onclick="switchTab('settings')" id="tabBtnSettings" class="flex flex-col items-center gap-1.5 bg-transparent border-none cursor-pointer p-0">
                <svg id="tabIconSettings" class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </div>
    </nav>
</div>

<script src="app.js"></script>
</body>
</html>
